<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contacto | Hologramas CR</title>
    <meta name="description" content="Contáctenos — Hologramas CR. Envíenos su consulta y nuestro equipo le responderá a la brevedad." />
    <link rel="icon" href="images/logo.png" type="image/png" />
    <link rel="stylesheet" href="css/styles.css" />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Outfit&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-GMX8XPWR30"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-GMX8XPWR30');
    </script>

    <!-- reCAPTCHA API -->
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>
<body>
<div class="holo-rings">
    <div class="holo-ring"></div>
    <div class="holo-ring"></div>
    <div class="holo-ring"></div>
</div>

<div id="particles-js"></div>

<header class="main-header glass">
    <div class="container">
        <div class="header-top">
            <a href="index.html" class="logo-link">
                <img src="images/logo.png" alt="Logo Hologramas CR" class="logo" />
            </a>
            <div class="cart-panel-header">
                <a href="cart.html" class="cart-button" aria-label="Ver carrito">
                    <i class="fa-solid fa-cart-shopping"></i>
                    <span id="cart-count" class="cart-count">0</span>
                </a>
            </div>
            <button class="menu-toggle" id="menuToggle" aria-label="Abrir menú">
                 <i class="fa-solid fa-bars"></i>
            </button>
        </div>

        <nav class="main-nav">
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html">Inicio</a></li>
                <li><a href="about.html">Acerca de Nosotros</a></li>
                <li><a href="products.html">Productos</a></li>
                <li><a href="services.html">Servicios</a></li>
                <li><a href="contact.html" aria-current="page">Contacto</a></li>
            </ul>
        </nav>
    </div>
</header>

<main class="container glass content">
  <section class="hero glass-inner">
    <h1>Contáctenos</h1>
    <p>¿Tiene alguna consulta o le interesa una demostración? Escríbanos y le responderemos a la brevedad.</p>
  </section>

  <section class="contact-form">
    <form id="form-contacto" action="https://formspree.io/f/xyzwvjnk" method="POST" class="form-grid">

      <div class="form-group">
        <label for="nombre">Nombre completo *</label>
        <input type="text" name="nombre" id="nombre" required>
      </div>

      <div class="form-group">
        <label for="empresa">Empresa</label>
        <input type="text" name="empresa" id="empresa">
      </div>

      <div class="form-group">
        <label for="telefono">Número de teléfono</label>
        <input type="tel" name="telefono" id="telefono">
      </div>

      <div class="form-group">
        <label for="email">Correo electrónico *</label>
        <input type="email" name="email" id="email" required>
      </div>

      <div class="form-group full">
        <label for="mensaje">Mensaje *</label>
        <textarea name="mensaje" id="mensaje" rows="5" required></textarea>
      </div>

      <div class="form-group full">
        <div class="g-recaptcha" data-sitekey="6Ld1-UErAAAAABnvnA8XuOOdajxlxAAXq_5pmV2F"></div>
      </div>

      <div class="form-group full">
        <button type="submit" class="btn-primary">Enviar mensaje</button>
      </div>

      <p id="respuesta-formulario" style="margin-top: 1rem; color: var(--primary);"></p>
    </form>
  </section>
</main>

<footer class="glass">
  <div class="container">
    <p>&copy; 2026 Hologramas CR. Todos los derechos reservados.</p>
    <p>San José, Costa Rica</p>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
<script src="js/script.js"></script>
<script src="js/products.js"></script>
<script src="js/cart.js"></script>

<script>
  document.getElementById("form-contacto").addEventListener("submit", async function(e) {
    e.preventDefault();

    const form = e.target;
    const data = new FormData(form);
    const respuesta = document.getElementById("respuesta-formulario");

    const token = typeof grecaptcha !== 'undefined' ? grecaptcha.getResponse() : null;
    if (!token) {
      respuesta.textContent = "Por favor, verifique que no es un robot.";
      return;
    }

    try {
      const res = await fetch(form.action, {
        method: "POST",
        body: data,
        headers: { 'Accept': 'application/json' }
      });

      if (res.ok) {
        respuesta.textContent = "Mensaje enviado con éxito. ¡Gracias por contactarnos!";
        form.reset();
        grecaptcha.reset();
      } else {
        respuesta.textContent = "Hubo un problema al enviar el mensaje. Intente de nuevo.";
      }
    } catch (error) {
      respuesta.textContent = "Error de conexión. Por favor, intente más tarde.";
    }
  });
</script>
</body>
</html>
